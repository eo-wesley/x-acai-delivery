version: '3.9'

# ─── Evolution API v2 — X-Açaí Delivery WhatsApp ────────────────────────────
# Comandos:
#   Iniciar  : docker compose -f docker-compose-evolution.yml up -d
#   Parar    : docker compose -f docker-compose-evolution.yml down
#   Logs     : docker compose -f docker-compose-evolution.yml logs -f
#   Remover  : docker compose -f docker-compose-evolution.yml down -v

services:
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: xacai-evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # ── Authentication ───────────────────────────────────────────────────────
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: xacai-secret-api-key-2024
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Server ───────────────────────────────────────────────────────────────
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      # ── Logging ──────────────────────────────────────────────────────────────
      LOG_LEVEL: "ERROR"
      LOG_COLOR: "true"
      LOG_BAILEYS: "error"

      # ── Database (Prisma + SQLite) ────────────────────────────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "sqlite"
      DATABASE_URL: "file:/evolution/db/evolution.db"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_OLD_MESSAGE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"

      # ── Storage for media ────────────────────────────────────────────────────
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"

      # ── QR Code ──────────────────────────────────────────────────────────────
      QRCODE_LIMIT: 30
      QRCODE_COLOR: "#7C3AED"

      # ── Instance Settings ────────────────────────────────────────────────────
      DEL_INSTANCE: "false"
      DEL_TEMP_INSTANCES: "false"

    volumes:
      - evolution_data:/evolution/db
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances

    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  evolution_data:
    driver: local
  evolution_store:
    driver: local
  evolution_instances:
    driver: local
