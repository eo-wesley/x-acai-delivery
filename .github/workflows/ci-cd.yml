name: CI/CD — X-Açaí SaaS Platform

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # 1. BUILD & VALIDATE
  # ============================================================
  build-and-test:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            apps/backend/package-lock.json
            apps/frontend/package-lock.json

      - name: Install Backend Dependencies
        run: npm ci
        working-directory: apps/backend

      - name: Build Backend (TypeScript)
        run: npm run build
        working-directory: apps/backend

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: apps/frontend

      - name: Build Frontend (Next.js)
        run: npm run build
        working-directory: apps/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Run Backend Validation Script
        run: |
          node apps/backend/dist/server.js &
          sleep 5
          node scripts/test-onboarding.js
        env:
          JWT_SECRET: ci_test_jwt_secret
          ADMIN_SECRET: admin_secret_123
          NODE_ENV: test
          PORT: 3000

  # ============================================================
  # 2. DOCKER BUILD (on push to main/production only)
  # ============================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: apps/backend
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xacai-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/xacai-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/xacai-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/xacai-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # 3. DEPLOY (on push to production only)
  # ============================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/production'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/xacai-delivery
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "✅ Deployment complete at $(date)"
