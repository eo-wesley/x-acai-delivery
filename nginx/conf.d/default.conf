# ============================================================
# NGINX VIRTUAL HOST — slug-based SaaS subdomain routing
# 
# How it works:
#   *.yourdomain.com → captures slug from subdomain
#   api.yourdomain.com → routes to backend:3000
#   *.yourdomain.com/* → routes to frontend with X-Tenant-Slug header
#   yourdomain.com → routes to main marketing/frontend page
#
# Replace BASE_DOMAIN below with your real domain.
# ============================================================

# ---- API subdomain → backend ----
server {
    listen 80;
    server_name api.yourdomain.com;

    location / {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ---- Tenant slug subdomains → frontend with slug context ----
# Example: acai-duduinha.yourdomain.com
server {
    listen 80;
    server_name ~^(?<tenant_slug>[a-z0-9-]+)\.yourdomain\.com$;

    # Do not match 'api' or 'www' subdomains
    if ($tenant_slug ~ ^(api|www|admin|mail)$) {
        return 301 http://yourdomain.com$request_uri;
    }

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass slug so Next.js middleware can read it
        proxy_set_header X-Tenant-Slug $tenant_slug;
    }
}

# ---- Main domain → frontend (landing page / admin login) ----
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    location /api/ {
        proxy_pass http://backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
