# Production backend blueprint for Render.
# Frontend lives on Vercel. Final custom-domain cutover is tracked in docs/PRODUCTION_CHECKLIST.md.
services:
  - type: web
    runtime: node
    name: x-acai-production-backend
    rootDir: apps/backend
    plan: starter
    buildCommand: npm ci --include=dev
    preDeployCommand: npm run db:migrate
    startCommand: npx tsx src/server.ts
    healthCheckPath: /health
    autoDeployTrigger: 'off'
    buildFilter:
      paths:
        - apps/backend/**
        - render.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DB_SEED_MINIMAL
        value: "false"
      - key: WHATSAPP_PROVIDER
        value: mock
      - key: DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
